 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolEase Dashboard</title>

    <!-- Dashboard Styles -->
    <link rel="stylesheet" href="dashboard.css">
</head>

<body class="dashboard-body">

    <header class="topbar">
        <h1>SCHOOLEASE</h1>

        <div class="user-info">
            <span id="welcomeUser">Welcome, Administrator</span>

            <button onclick="logout()" class="logout-btn">
                Logout
            </button>
        </div>
    </header>

    <div class="menu">

        <a href="students.html" class="menu-card">
            <div class="icon">🎓</div>
            <span>Students</span>
        </a>

        <a href="attendance.html" class="menu-card">
            <div class="icon">📅</div>
            <span>Attendance</span>
        </a>

        <a href="result.html" class="menu-card">
            <div class="icon">📝</div>
            <span>Results</span>
        </a>

        <a href="viewparents.html" class="menu-card">
            <div class="icon">👨‍👩‍👧</div>
            <span>Parents</span>
        </a>

        <a href="settings.html" class="menu-card">
            <div class="icon">⚙️</div>
            <span>Settings</span>
        </a>

    </div>

    <script>
        // Protect Dashboard
        if (localStorage.getItem("loggedIn") !== "true") {
            window.location.href = "index.html";
        }

        // Logout
        function logout() {
            localStorage.removeItem("loggedIn");
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
