<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolEase - Select Role</title>

    <link rel="stylesheet" href="css/style1.css">
</head>

<body class="login-body">

<div class="login-container">

    <div class="login-icon">
        🏫
    </div>

    <h1>SchoolEase</h1>

    <p>
        A unified, seamless management portal for your entire school community.
        Please select your role to continue.
    </p>

    <div class="role-buttons">

        <button class="role-card" onclick="location.href='principal-login.html'">
            <span class="left">🏫</span>
            <span class="middle">Principal</span>
            <span class="right">➜</span>
        </button>

        <button class="role-card" onclick="location.href='teacher-login.html'">
            <span class="left">📖</span>
            <span class="middle">Teacher</span>
            <span class="right">➜</span>
        </button>

        <button class="role-card" onclick="location.href='student-login.html'">
            <span class="left">🎓</span>
            <span class="middle">Student</span>
            <span class="right">➜</span>
        </button>

        <button class="role-card" onclick="location.href='parent-login.html'">
            <span class="left">👨‍👩‍👧</span>
            <span class="middle">Parent</span>
            <span class="right">➜</span>
        </button>

    </div>

</div>

</body>
</html>
