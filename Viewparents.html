 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Parents - SchoolEase</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; padding: 20px; }
        header { text-align: center; color: #1d4ed8; margin-bottom: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .search-box { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #2563eb; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f8fafc; }

        .btn { display: inline-block; padding: 10px 15px; background: #2563eb; color: white; text-decoration: none; border-radius: 8px; margin-right: 10px; margin-top: 10px; }
        .btn-small { padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; margin-right: 5px; color: white; font-weight: bold; }
        .edit-btn { background: #f59e0b; } /* Orange */
        .delete-btn { background: #ef4444; } /* Red */
    </style>
</head>
<body>

<header>
    <h1>SCHOOLEASE</h1>
    <p>All Registered Parents</p>
</header>

<div class="container">
    <h2>Parents List</h2>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search parent or student name..." onkeyup="searchParents()">
    
    <table id="parentsTable">
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Parent Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="parentsList">
        </tbody>
    </table>
    
    <a href="parents.html" class="btn">+ Add New Parent</a>
    <a href="dashboard.html" class="btn">Back to Dashboard</a>
</div>

<script>
    let parents = JSON.parse(localStorage.getItem('parents')) || [];

    function displayParents(list) {
        const tbody = document.getElementById('parentsList');
        tbody.innerHTML = "";

        if(list.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:20px;">No parents found</td></tr>`;
            return;
        }

        list.forEach(p => {
            tbody.innerHTML += `
                <tr>
                    <td>${p.studentName}</td>
                    <td>${p.parentName}</td>
                    <td>${p.phone}</td>
                    <td>${p.email}</td>
                    <td>
                        <button class="btn-small edit-btn" onclick="editParent(${p.id})">Edit</button>
                        <button class="btn-small delete-btn" onclick="deleteParent(${p.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    function searchParents() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = parents.filter(p => 
            p.studentName.toLowerCase().includes(query) || 
            p.parentName.toLowerCase().includes(query)
        );
        displayParents(filtered);
    }

    function deleteParent(id) {
        if(confirm("Are you sure you want to delete this parent?")) {
            parents = parents.filter(p => p.id !== id);
            localStorage.setItem('parents', JSON.stringify(parents));
            displayParents(parents);
        }
    }

    function editParent(id) {
        const parent = parents.find(p => p.id === id);
        if(parent) {
            localStorage.setItem('editParent', JSON.stringify(parent));
            window.location.href = "parents.html?edit=" + id;
        }
    }

    displayParents(parents);
</script>

</body>
</html>
