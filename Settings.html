 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolEase - Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
    <h1>SCHOOLEASE</h1>
    <p>System Settings</p>
</header>

<a href="Dashboard.html" class="back-btn">← Back to Dashboard</a>

<div class="container">

<h2>Settings</h2>

<label>School Name</label><br>
<input type="text" id="schoolName" placeholder="Enter School Name"><br><br>

<label>Principal Name</label><br>
<input type="text" id="principal" placeholder="Enter Principal Name"><br><br>

<label>School Email</label><br>
<input type="email" id="email" placeholder="Enter School Email"><br><br>

<label>Academic Session</label><br>
<input type="text" id="session" placeholder="2026/2027"><br><br>

<button onclick="saveSettings()">Save Settings</button>

<h3 id="message"></h3>

</div>

<script src="js/settings.js"></script>
</body>
</html>
