<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parents - SchoolEase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>SCHOOLEASE</h1>
    <p>Parents Information</p>
</header>

<div class="container">
    <h2>Parent Details</h2>

    <input type="text" id="studentName" placeholder="Student Name"><br><br>

    <input type="text" id="parentName" placeholder="Parent Name"><br><br>

    <input type="tel" id="phone" placeholder="Parent Phone Number"><br><br>

    <input type="email" id="email" placeholder="Parent Email"><br><br>

    <button onclick="saveParent()">Save Parent</button>

    <br><br>

    <div id="message"></div>

    <br>

    <a href="dashboard.html" class="btn">Back to Dashboard</a>
</div>

<script src="parents.js"></script>

</body>
</html>
