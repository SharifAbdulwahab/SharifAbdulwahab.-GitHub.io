 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolEase - Attendance</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .present { background: #4CAF50; color: white; }
        .absent { background: #f44336; color: white; }
        .attendance-btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; margin: 0 5px; font-weight: bold; }
        .date-picker { padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px; }
    </style>
</head>
<body>

<header class="topbar">
    <h1>SCHOOLEASE</h1>
    <p>Mark Attendance</p>
</header>

<a href="Dashboard.html" class="back-btn">← Back to Dashboard</a>

<div class="container">
    <h2>Take Attendance</h2>

    <label>Select Date:</label><br>
    <input type="date" id="attendanceDate" class="date-picker"><br><br>

    <label>Select Class:</label><br>
    <input type="text" id="className" placeholder="e.g. JSS1A" class="date-picker"><br><br>

    <button onclick="loadStudents()" class="btn">Load Students</button>
    
    <h3 id="message"></h3>

    <table id="attendanceTable" style="width:100%; margin-top:20px; display:none;">
        <thead>
            <tr>
                <th>Student ID</th>
                <th>Student Name</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="attendanceList">
        </tbody>
    </table>

    <button onclick="saveAttendance()" class="btn" id="saveBtn" style="display:none; margin-top:20px;">Save Attendance</button>
</div>

<script>
let students = JSON.parse(localStorage.getItem('students')) || [];
let attendanceData = [];

document.getElementById('attendanceDate').valueAsDate = new Date();

function loadStudents() {
    const className = document.getElementById('className').value.trim();
    const tbody = document.getElementById('attendanceList');
    const msg = document.getElementById('message');
    
    if(!className) {
        msg.innerText = "Please enter class name";
        msg.style.color = "red";
        return;
    }

    const classStudents = students.filter(s => s.class.toLowerCase() === className.toLowerCase());
    
    if(classStudents.length === 0) {
        msg.innerText = "No students found in this class";
        msg.style.color = "red";
        document.getElementById('attendanceTable').style.display = "none";
        document.getElementById('saveBtn').style.display = "none";
        return;
    }

    msg.innerText = "";
    attendanceData = [];
    tbody.innerHTML = "";

    classStudents.forEach(s => {
        attendanceData.push({id: s.id, name: s.name, status: "Present"});
        tbody.innerHTML += `
            <tr>
                <td>${s.id}</td>
                <td>${s.name}</td>
                <td>
                    <button class="attendance-btn present" onclick="markStatus(${s.id}, 'Present', this)">Present</button>
                    <button class="attendance-btn" onclick="markStatus(${s.id}, 'Absent', this)">Absent</button>
                </td>
            </tr>
        `;
    });

    document.getElementById('attendanceTable').style.display = "table";
    document.getElementById('saveBtn').style.display = "inline-block";
}

function markStatus(id, status, btn) {
    const record = attendanceData.find(a => a.id === id);
    if(record) record.status = status;
    
    const row = btn.closest('tr');
    const buttons = row.querySelectorAll('.attendance-btn');
    buttons.forEach(b => {
        b.classList.remove('present', 'absent');
        b.style.background = "#ddd";
        b.style.color = "#333";
    });
    
    if(status === "Present") {
        btn.classList.add('present');
    } else {
        btn.classList.add('absent');
    }
}

function saveAttendance() {
    const date = document.getElementById('attendanceDate').value;
    const className = document.getElementById('className').value;
    const msg = document.getElementById('message');
    
    let allAttendance = JSON.parse(localStorage.getItem('attendance')) || [];
    
    // Remove old attendance for same date + class
    allAttendance = allAttendance.filter(a => !(a.date === date && a.class === className));
    
    allAttendance.push({date, class: className, records: attendanceData});
    localStorage.setItem('attendance', JSON.stringify(allAttendance));
    
    msg.innerText = "Attendance saved successfully!";
    msg.style.color = "green";
}
</script>

</body>
</html>
