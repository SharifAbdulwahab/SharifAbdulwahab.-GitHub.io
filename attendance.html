<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SchoolEase | Attendance</title>

<link rel="stylesheet" href="attendance.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header class="topbar">

<div class="logo">

<i class="fa-solid fa-school"></i>

<h2>SchoolEase</h2>

</div>

<div class="today">

<span id="currentDate"></span>

</div>

</header>


<div class="container">

<h1>Attendance Management</h1>

<div class="controls">

<div>

<label>Class</label>

<select id="classSelect">

<option value="">Select Class</option>

<option>JSS1A</option>

<option>JSS1B</option>

<option>JSS2A</option>

<option>JSS2B</option>

<option>JSS3A</option>

<option>JSS3B</option>

<option>SS1A</option>

<option>SS2A</option>

<option>SS3A</option>

</select>

</div>

<div>

<label>Search Student</label>

<input
type="text"
id="searchInput"
placeholder="Search by Name or ID">

</div>

<div>

<button id="loadBtn">

<i class="fa-solid fa-users"></i>

Load Students

</button>

</div>

</div>


<div class="summary">

<div class="card">

<h2 id="totalStudents">0</h2>

<p>Total Students</p>

</div>

<div class="card green">

<h2 id="presentCount">0</h2>

<p>Present</p>

</div>

<div class="card yellow">

<h2 id="lateCount">0</h2>

<p>Late</p>

</div>

<div class="card red">

<h2 id="absentCount">0</h2>

<p>Absent</p>

</div>

</div>


<div class="table-box">

<table>

<thead>

<tr>

<th>ID</th>

<th>Student Name</th>

<th>Class</th>

<th>Date</th>

<th>Arrival Time</th>

<th>Status</th>

</tr>

</thead>

<tbody id="studentTable">

<!-- JavaScript loads students here -->

</tbody>

</table>

</div>


<div class="buttons">

<button id="saveAttendance">

<i class="fa-solid fa-floppy-disk"></i>

Save Attendance

</button>

<button id="printAttendance">

<i class="fa-solid fa-print"></i>

Print

</button>

<button id="exportAttendance">

<i class="fa-solid fa-file-pdf"></i>

Export PDF

</button>

</div>

</div>

<script src="attendance.js"></script>

</body>
</html>
